name: Build and Release Snap

on:
  push:
    branches:
      - master
      - stable
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-snap:
    runs-on: ubuntu-24.04 
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: creusot-snap-${{ github.ref_name }}
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Upload to Release (tagged/manual release)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: ${{ steps.snapcraft.outputs.snap }}

      - name: Update latest release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest ${{ steps.snapcraft.outputs.snap }} --clobber 2>/dev/null || \
          gh release create latest ${{ steps.snapcraft.outputs.snap }} --title "latest" --notes "Latest build from master" --prerelease
